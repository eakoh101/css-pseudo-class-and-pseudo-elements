<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>CSS Pseudo-class and Pseudo-element</title>
  </head>
  <body>
    <form class="registration-form">
      <label for="username">
        Username:
        <input id="username" type="text" />
      </label>
      
      <label for="email">
        Email: 
        <input id="email" type="email" disabled />
      </label>
    
      <label for="password">
        Password:
        <input id="password" type="password" />		
      </label>
    
      <button type="submit">Submit</button>
    </form>
  </body>
</html>

<!-- ให้เขียน CSS Rule เพื่อกำหนด Style ให้กับส่วนประกอบของ Form ดังนี้
กำหนด Style ให้กับ Input ที่มีสถานะเป็น “disabled” ให้มีสีพื้นหลังเป็นสี lightgrey
กำหนด Style ให้กับ Input เวลาที่มีผู้ใช้งานมา Hover บน Input ให้มีสีขอบของ Input เป็นสี khaki
กำหนด Style ให้กับ Button เวลาที่มีผู้ใช้งานมา Hover บน Button ให้ข้อความภายในปุ่มมีสี pink -->
